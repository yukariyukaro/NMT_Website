name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        # 动态注入 base path，使其适配 /repo-name/ 路径
        # 注意：这里假设 build 脚本调用的是 vite build，可以通过 -- 传递参数
        run: pnpm run build --base=/${{ github.event.repository.name }}/

      - name: SPA Fallback & NoJekyll
        # 1. 复制 index.html 为 404.html 以解决 SPA 刷新 404 问题
        # 2. 创建 .nojekyll 防止 GitHub Pages 忽略下划线开头的文件
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
